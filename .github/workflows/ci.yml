name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  format:
    name: clang-format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install clang-format
        run: sudo apt-get update && sudo apt-get install -y clang-format
      - name: Check formatting
        run: make lint

  build:
    name: build kernel + userland
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install toolchain
        run: sudo apt-get update && sudo apt-get install -y gcc
      - name: Build kernel
        run: make kernel.bin
      - name: Build userland module
        run: make build/user/hello.elf

  test:
    name: qemu boot test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install toolchain + QEMU + OVMF + mtools
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc qemu-system-x86 ovmf mtools socat
      - name: Fetch Limine (binary release branch)
        run: git clone --branch=v9.x-binary --depth=1 https://github.com/limine-bootloader/limine.git /tmp/limine
      - name: Boot smoke test (kernel through to userland)
        run: |
          export LIMINE_DIR=/tmp/limine
          make test OVMF_FD=/usr/share/ovmf/OVMF.fd
