name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  format:
    name: clang-format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install clang-format
        run: sudo apt-get update && sudo apt-get install -y clang-format
      - name: Check formatting
        run: make lint

  build:
    name: build kernel + userland
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-multilib nasm
      - name: Build kernel
        run: make kernel.bin
      - name: Build userland (bootstrap init)
        run: make -C build/bootstrap
      - name: Build userland tasks
        run: make -C build/tasks

  test:
    name: qemu integration tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install toolchain + QEMU
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-multilib nasm qemu-system-x86
      - name: Run in-kernel tests under QEMU
        run: make test

  cross-macos:
    name: cross build + tests (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install i686-elf cross toolchain + QEMU
        run: |
          brew update
          brew install i686-elf-gcc i686-elf-binutils nasm qemu coreutils
      - name: Build kernel (cross)
        run: make CROSS=i686-elf- kernel.bin
      - name: Run in-kernel tests under QEMU (cross)
        run: make CROSS=i686-elf- test
