# Run `pre-commit install` once to enable these hooks locally.
# See https://pre-commit.com for details.

# build/tools/qoi.h is the reference QOI codec, vendored verbatim; keep every
# hook off it.
exclude: ^build/tools/qoi\.h$

repos:
  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: v18.1.8
    hooks:
      - id: clang-format
        # Format C sources and headers only (NASM is not supported).
        # limine.h, flanterm and printf are vendored verbatim.
        files: \.(c|h)$
        exclude: ^(include/limine\.h|src/flanterm/|src/printf/|include/printf/|src/lua/|include/lua/)
        types_or: [c]

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: mixed-line-ending
      - id: check-merge-conflict
