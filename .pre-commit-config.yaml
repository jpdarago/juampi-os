# Run `pre-commit install` once to enable these hooks locally.
# See https://pre-commit.com for details.
repos:
  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: v18.1.8
    hooks:
      - id: clang-format
        # Format C sources and headers only (NASM is not supported).
        # include/limine.h is vendored verbatim from the Limine project.
        files: \.(c|h)$
        exclude: ^include/limine\.h$
        types_or: [c]

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: mixed-line-ending
      - id: check-merge-conflict
